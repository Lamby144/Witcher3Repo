<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Witcher 3 – Platinum AI Route System</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <h1>🐺 Witcher 3 Platinum AI Route</h1>

    <div id="dashboard">
      <h2>🎯 Next Best Action</h2>
      <div id="nextTask">Loading route...</div>

      <h2>⚠️ Warnings</h2>
      <div id="warnings"></div>

      <h2>📊 Completion Progress</h2>
      <div id="progressBar"><div id="progressFill"></div></div>
      <p id="progressText">0%</p>
    </div>
  </header>

  <hr/>

  <section>
    <input
      id="search"
      placeholder="Search quests, Gwent cards, merchants..."
      autocomplete="off"
    />
  </section>

  <hr/>

  <main id="app"></main>

  <hr/>

  <footer>
    <p>⚡ Platinum route system – safe missable-free walkthrough</p>
  </footer>

  <!-- SCRIPT ORDER -->
  <script src="data.js"></script>
  <script src="gwent.js"></script>
  <script src="routeengine.js"></script>
  <script src="airouter.js"></script>
  <script src="app.js"></script>
</body>
</html>
