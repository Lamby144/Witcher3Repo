<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Witcher 3 – Platinum Cheat Sheet</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <h1>🐺 Witcher 3 Platinum Cheat Sheet</h1>

    <div id="dashboard">
      <h2>🎯 Next Best Action</h2>
      <div id="nextTask">Loading route...</div>

      <h2>⚠️ Warnings</h2>
      <div id="warnings"></div>

      <h2>📊 Completion Progress</h2>
      <div id="progressBar">
        <div id="progressFill"></div>
      </div>
      <p id="progressText">0%</p>

      <div id="settings" class="settings">
        <div class="setting">
          <label for="difficulty">🎚️ Roadmap Difficulty</label>
          <select id="difficulty">
            <option value="deathmarch" selected>Death March (default)</option>
            <option value="bloodbrokenbones">Blood and Broken Bones</option>
            <option value="storysword">Story and Sword</option>
            <option value="juststory">Just the Story</option>
          </select>
        </div>

        <div class="setting">
          <label for="storyStage">📍 Story Stage</label>
          <select id="storyStage">
            <option value="early" selected>Early game (White Orchard / Velen)</option>
            <option value="mid">Mid game (Novigrad / Skellige)</option>
            <option value="pre_isle">⚠ Approaching Isle of Mists (pre‑lock)</option>
            <option value="post_isle">Post Isle of Mists (lock passed)</option>
            <option value="endgame">Endgame / cleanup</option>
            <option value="ngplus_prep">NG+ Preparation</option>
            <option value="ngplus">New Game+</option>
          </select>
        </div>
      </div>

    </div>
  </header>

  <hr/>

  <section>
    <input
      id="search"
      placeholder="Search quests, trophies, Gwent cards, merchants..."
      autocomplete="off"
    />
  </section>

  <hr/>

  <main id="app"></main>

  <hr/>

  <footer>
    <p>⚡ Saved locally in your browser (localStorage). If you clear site data, progress resets.</p>
  </footer>

  <!-- SCRIPT ORDER (important) -->
  <script src="data.js"></script>
  <script src="trophies.js"></script>
  <script src="gwent-loader.js"></script>
  <script src="settings.js"></script>
  <script src="routeengine.js"></script>
  <script src="airouter.js"></script>
  <script src="app.js"></script>
</body>
</html>
